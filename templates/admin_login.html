<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — DNS Messenger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6E1;</text></svg>">
    <style>
        :root { --bg: #0e1621; --card: #17212b; --input: #242f3d; --border: #1f2c3a; --text: #f5f5f5; --muted: #546778; --accent: #8774e1; --red: #e05d5d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 380px; max-width: 92vw; text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 20px; margin-bottom: 8px; }
        .sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
        input { width: 100%; padding: 13px 16px; background: var(--input); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; margin-bottom: 14px; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .err { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }
        a { color: var(--accent); text-decoration: none; display: block; margin-top: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#x1F6E1;</div>
        <h1>Admin Panel</h1>
        <p class="sub">DNS Messenger administration</p>
        <form onsubmit="return doLogin(event)">
            <input type="password" id="pw" placeholder="Admin password" autofocus required>
            <button type="submit" id="btn">Sign In</button>
            <div class="err" id="err"></div>
        </form>
        <a href="/">Back to messenger</a>
    </div>
    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const err = document.getElementById('err');
            btn.disabled = true;
            err.style.display = 'none';
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('pw').value }),
                }).then(r => r.json());
                if (res.ok) {
                    window.location.reload();
                } else {
                    err.textContent = res.error;
                    err.style.display = 'block';
                }
            } catch (ex) {
                err.textContent = 'Server error';
                err.style.display = 'block';
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
